<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú IPS-Source</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .card { background: white; border-radius: 15px; padding: 15px; margin: 15px auto; max-width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-add { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 2px solid #ddd; }
        .btn-finalizar { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; width: 100%; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <h1>🍕 Nuestro Menú</h1>
    <div class="card">
        <h3>Pizza Margherita</h3><p>$ 450</p>
        <button class="btn-add" onclick="add('Pizza Margherita', 450)">Agregar</button>
    </div>
    <div class="card">
        <h3>Hamburguesa Doble</h3><p>$ 350</p>
        <button class="btn-add" onclick="add('Hamburguesa Doble', 350)">Agregar</button>
    </div>

    <div class="footer">
        <p>Total: $ <span id="total">0</span></p>
        <button class="btn-finalizar" onclick="checkout()">🚀 Finalizar Pedido</button>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) { cart.push(n); total += p; document.getElementById('total').innerText = total; }
        function checkout() {
            if(cart.length === 0) return alert("Carrito vacío");
            const msg = `*NUEVO PEDIDO*%0A*Items:* ${cart.join(", ")}%0A*Total:* $${total}`;
            window.location.href = `whatsapp://send?phone=59891714945&text=${msg}`;
        }
    </script>
</body>
</html>
