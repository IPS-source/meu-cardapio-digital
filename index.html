
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cardápio Online</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #eee; }
        .item { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 18px; cursor: pointer; text-decoration: none; display: block; width: 100%; }
    </style>
</head>
<body>

    <h1>🍕 Teste de Pedido</h1>

    <div class="item">
        <h3>Produto de Teste</h3>
        <p>R$ 10,00</p>
        <!-- BOTÃO COM LINK DIRETO (Sem JavaScript para não falhar) -->
        <a id="linkPedido" class="btn" href="#">ENVIAR PEDIDO AGORA</a>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const meuNumero = "59891714945"; // COLOQUE SEU NÚMERO AQUI (Apenas números)
        // -------------------

        const texto = encodeURIComponent("Olá! Estou testando o botão de pedido do meu sistema.");
     // FORMA CORRECTA (con la barra / antes del número)
        const urlFinal = "https://wa.me" + meuNumero + "?text=" + texto;


        // Atribui o link ao botão assim que a página carrega
        document.getElementById("linkPedido").href = urlFinal;
        
        // Alerta de teste para saber se o script rodou
        console.log("Link configurado para: " + urlFinal);
    </script>

</body>
</html>
