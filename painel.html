<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Cocina | IPS-Source</title>
    <!-- Librerías desde Cloudflare (Menos bloqueadas por Edge/Brave) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; color: #000; padding: 20px; border-radius: 15px; border-top: 10px solid #2ecc71; }
        h1 { color: #2ecc71; border-bottom: 1px solid #333; padding-bottom: 10px; }
        button { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #msg { text-align: center; color: #666; margin-top: 50px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>🚀 Panel IPS-Source</h1>
    <div id="contenedor" class="grid">
        <p id="msg">Sincronizando con la nube...</p>
    </div>
    
    <audio id="alarma" src="https://mixkit.co"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com/" };

        function conectar() {
            if (typeof firebase === 'undefined') {
                document.getElementById('msg').innerHTML = "❌ Error de conexión.<br>Intenta abrir el panel desde tu celular para probar.";
                return;
            }

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            document.getElementById('msg').innerText = "✅ SISTEMA CONECTADO. ESPERANDO PEDIDOS...";

            db.ref('pedidos').on('child_added', (snaps) => {
                const p = snaps.val();
                if (document.getElementById('msg')) document.getElementById('msg').remove();
                
                document.getElementById('alarma').play().catch(() => {});

                const div = document.createElement('div');
                div.className = 'card';
                div.id = snaps.key;
                div.innerHTML = `
                    <small>${p.fecha}</small>
                    <p><b>📱 Cliente:</b> ${p.cliente}</p>
                    <p style="background:#f4f4f4; padding:10px; border-radius:5px;">${p.contenido}</p>
                    <button onclick="despachar('${snaps.key}')">✓ DESPACHAR</button>
                `;
                document.getElementById('contenedor').prepend(div);
            });
        }

        setTimeout(conectar, 1000);

        function despachar(id) {
            if(confirm("¿Pedido entregado?")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => {
                    document.getElementById(id).remove();
                });
            }
        }
    </script>
</body>
</html>
