<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Cocina | IPS-Source</title>
    <!-- Librerías base de Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; border-left: 10px solid #2ecc71; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #2ecc71; }
        button { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .no-pedidos { text-align: center; color: #666; margin-top: 50px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>🚀 Pedidos IPS-Source (Cocina)</h1>
    <div id="contenedor" class="grid"><p class="no-pedidos">Conectando con la nube...</p></div>
    
    <!-- Sonido de alerta -->
    <audio id="alarma" src="https://mixkit.co"></audio>

    <script>
        // Configuración de tu Firebase
        const firebaseConfig = { databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com/" };

        // Inicializar cuando la página cargue
        window.onload = function() {
            if (typeof firebase === 'undefined') {
                alert("Error: Asegúrate de tener internet para cargar las librerías.");
                return;
            }

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // Escuchar pedidos en tiempo real
            db.ref('pedidos').on('child_added', (snaps) => {
                const noP = document.querySelector('.no-pedidos');
                if (noP) noP.remove();

                const p = snaps.val();
                
                // Intentar sonar la alarma
                document.getElementById('alarma').play().catch(() => console.log("Haz clic en la página para activar sonido"));

                const div = document.createElement('div');
                div.className = 'card';
                div.id = snaps.key;
                div.innerHTML = `
                    <small style="color:#888">${p.fecha}</small>
                    <p><b>📱 Cliente:</b> ${p.cliente}</p>
                    <p style="background:#f4f4f4; padding:10px; border-radius:5px; white-space: pre-wrap;">${p.contenido}</p>
                    <button onclick="despachar('${snaps.key}')">✓ ENTREGADO</button>
                `;
                document.getElementById('contenedor').prepend(div);
            });
        };

        function despachar(id) {
            if(confirm("¿Pedido listo? Se borrará de la pantalla.")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => {
                    document.getElementById(id).remove();
                });
            }
        }
    </script>
</body>
</html>
