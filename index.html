<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital Express</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f8f9fa; color: #333; }
        .card { background: white; padding: 20px; margin: 15px auto; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { color: #e74c3c; }
        .btn-pedir { background: #25d366; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-pedir:hover { background: #128c7e; }
    </style>
</head>
<body>
    <h1>🍕 Nuestro Menú</h1>
    <p>Haz clic en el botón para armar tu pedido:</p>
    
    <div class="card">
        <h3>Pizza Margherita</h3>
        <p>Precio: $10.00</p>
        <button class="btn-pedir" onclick="enviarPedido('Pizza Margherita')">Pedir por WhatsApp</button>
    </div>

    <div class="card">
        <h3>Hamburguesa Doble</h3>
        <p>Precio: $8.50</p>
        <button class="btn-pedir" onclick="enviarPedido('Hamburguesa Doble')">Pedir por WhatsApp</button>
    </div>

    <script>
        function enviarPedido(item) {
            const telefono = "+598714945"; 
            const texto = encodeURIComponent(`¡Hola! Me gustaría pedir: ${item}. ¿Me confirman el pedido?`);
            window.location.href = `https://wa.me{telefono}?text=${texto}`;
        }
    </script>
</body>
</html>
