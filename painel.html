<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel IPS-Source | Brave</title>
    <!-- Cargamos una versión diferente de Firebase (Compat) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; text-align: left; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; border-left: 10px solid #fb542b; }
        .btn-retry { background: #fb542b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button.despacho { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🚀 Panel de Cocina IPS-Source</h1>
    <div id="contenedor" class="grid">
        <div id="status-msg">
            <p>Conectando con la nube...</p>
            <button class="btn-retry" onclick="location.reload()">Forzar Reintento</button>
        </div>
    </div>
    <audio id="alarma" src="https://mixkit.co"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com/" };

        function iniciar() {
            if (typeof firebase === 'undefined') {
                document.getElementById('status-msg').innerHTML = `
                    <p style="color:#fb542b">❌ ERROR: Brave sigue bloqueando las librerías.</p>
                    <p>1. Clic en el León -> <b>Configuración avanzada</b>.</p>
                    <p>2. Cambia "Bloqueo de huellas digitales" a <b>Desactivado</b>.</p>
                    <button class="btn-retry" onclick="location.reload()">Reintentar Conexión</button>
                `;
                return;
            }

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            db.ref('pedidos').on('child_added', (snaps) => {
                const msg = document.getElementById('status-msg');
                if (msg) msg.remove();

                const p = snaps.val();
                document.getElementById('alarma').play().catch(() => {});

                const div = document.createElement('div');
                div.className = 'card';
                div.id = snaps.key;
                div.innerHTML = `
                    <small>${p.fecha}</small>
                    <p><b>📱 Cliente:</b> ${p.cliente}</p>
                    <p style="background:#f4f4f4; padding:10px; border-radius:5px;">${p.contenido.replace(/\n/g, '<br>')}</p>
                    <button class="despacho" onclick="despachar('${snaps.key}')">✓ DESPACHAR</button>
                `;
                document.getElementById('contenedor').prepend(div);
            });
        }

        // Ejecutar con retraso para dar tiempo a las librerías
        setTimeout(iniciar, 1500);

        function despachar(id) {
            if(confirm("¿Pedido entregado?")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => document.getElementById(id).remove());
            }
        }
    </script>
</body>
</html>
