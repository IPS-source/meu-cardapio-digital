<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel IPS-Source | Brave</title>
    <!-- Librerías desde CDN alternativo -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; border-left: 10px solid #fb542b; }
        h1 { color: #fb542b; border-bottom: 1px solid #333; padding-bottom: 10px; }
        button { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .no-pedidos { text-align: center; color: #666; margin-top: 50px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>🚀 Panel de Cocina IPS-Source</h1>
    <div id="contenedor" class="grid"><p class="no-pedidos">Conectando con la nube...</p></div>
    <audio id="alarma" src="https://mixkit.co"></audio>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = { databaseURL: "https://firebaseio.com" };

        window.onload = function() {
            if (typeof firebase === 'undefined') {
                document.querySelector('.no-pedidos').innerHTML = "❌ BRAVE BLOQUEÓ EL SCRIPT.<br>Haz clic en el León naranja y desactiva 'Shields'.";
                return;
            }

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            db.ref('pedidos').on('child_added', (snaps) => {
                const noP = document.querySelector('.no-pedidos');
                if (noP) noP.remove();

                const p = snaps.val();
                document.getElementById('alarma').play().catch(() => {});

                const div = document.createElement('div');
                div.className = 'card';
                div.id = snaps.key;
                div.innerHTML = `
                    <small>${p.fecha}</small>
                    <p><b>📱 Cliente:</b> ${p.cliente}</p>
                    <p style="background:#f4f4f4; padding:10px; border-radius:5px;">${p.contenido.replace(/\n/g, '<br>')}</p>
                    <button onclick="despachar('${snaps.key}')">✓ DESPACHAR</button>
                `;
                document.getElementById('contenedor').prepend(div);
            });
        };

        function despachar(id) {
            if(confirm("¿Pedido entregado?")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => document.getElementById(id).remove());
            }
        }
    </script>
</body>
</html>
