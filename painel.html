<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cocina | IPS-Source</title>
    <!-- Cargamos la versión 'compat' que es la más resistente a bloqueos -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; text-align: left; }
        .card { background: white; color: #333; padding: 15px; border-radius: 12px; border-left: 8px solid #2ecc71; margin-bottom: 10px; }
        #status-box { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; font-weight: bold; }
        button.delete { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🚀 Panel de Cocina IPS-Source</h1>
    <div id="status-box">Iniciando conexión...</div>

    <div id="pedidos-lista" class="grid"></div>
    <audio id="alarma" src="https://mixkit.co"></audio>

    <script>
        // Configuración directa
        const config = { databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com" };

        function conectar() {
            const box = document.getElementById('status-box');

            // Intento de detección de Firebase
            if (typeof firebase === 'undefined') {
                box.innerHTML = "❌ Error: Librerías no detectadas.<br>Refresca la página o intenta en Modo Incógnito.";
                box.style.color = "#ff4d4d";
                return;
            }

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                const db = firebase.database();
                box.innerHTML = "✅ PANEL CONECTADO";
                box.style.color = "#2ecc71";

                // Escuchar pedidos
                db.ref('pedidos').on('child_added', (snap) => {
                    box.style.display = 'none';
                    const p = snap.val();
                    
                    // Alarma
                    const audio = document.getElementById('alarma');
                    if(audio) audio.play().catch(() => {});

                    const div = document.createElement('div');
                    div.className = 'card';
                    div.id = snap.key;
                    div.innerHTML = `
                        <small style="color:#888">${p.fecha || ''}</small>
                        <p><b>📱 Cliente:</b> ${p.cliente || 'Nuevo'}</p>
                        <p style="background:#f4f4f4; padding:10px; border-radius:8px;">
                            ${(p.contenido || '').replace(/\n/g, '<br>')}
                        </p>
                        <button class="delete" onclick="borrar('${snap.key}')">MARCAR ENTREGADO</button>
                    `;
                    document.getElementById('pedidos-lista').prepend(div);
                });

            } catch (e) {
                box.innerHTML = "❌ Error: " + e.message;
            }
        }

        // Ejecutar con un retraso para asegurar que los scripts externos carguen
        window.onload = () => {
            setTimeout(conectar, 2000);
        };

        function borrar(id) {
            if(confirm("¿Pedido listo?")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                });
            }
        }
    </script>
</body>
</html>
