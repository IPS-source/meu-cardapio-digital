<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Cocina | IPS-Source</title>
    <!-- Cargamos Firebase desde un servidor de respaldo diferente -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; text-align: left; }
        .card { background: white; color: #333; padding: 15px; border-radius: 12px; border-left: 8px solid #2ecc71; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(255,255,255,0.1); }
        #status-box { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        button.delete { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .loading { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 Panel de Pedidos IPS-Source</h1>
    <div id="status-box">
        <span id="status-text" class="loading">Iniciando conexión...</span>
    </div>

    <div id="pedidos-lista" class="grid"></div>
    
    <!-- Sonido de Alerta -->
    <audio id="alarma" src="https://mixkit.co" preload="auto"></audio>

    <script>
        // Tu configuración exacta
        const config = { databaseURL: "https://ips-source-pedidos-default-rtdb.firebaseio.com/" };

        function conectar() {
            const statusText = document.getElementById('status-text');
            
            if (typeof firebase === 'undefined') {
                statusText.innerHTML = "❌ ERROR: Librerías no cargadas.<br>Por favor, intenta abrir este link en <b>Google Chrome</b> (no Brave/Edge).";
                statusText.style.color = "#e74c3c";
                return;
            }

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                const db = firebase.database();
                
                statusText.innerHTML = "✅ PANEL CONECTADO - Esperando pedidos...";
                statusText.className = "";
                statusText.style.color = "#2ecc71";

                // Escuchar pedidos
                db.ref('pedidos').on('child_added', (snap) => {
                    const p = snap.val();
                    
                    // Intentar sonar alarma
                    const audio = document.getElementById('alarma');
                    audio.play().catch(() => console.log("Clic en la pantalla para activar sonido"));

                    const div = document.createElement('div');
                    div.className = 'card';
                    div.id = snap.key;
                    div.innerHTML = `
                        <div style="font-size:0.7em; color:#888; margin-bottom:5px;">${p.fecha || ''}</div>
                        <p><b>📱 Cliente:</b> ${p.cliente || 'Nuevo'}</p>
                        <p style="background:#f4f4f4; padding:10px; border-radius:8px; font-size:0.9em; line-height:1.4;">
                            ${(p.contenido || '').replace(/\n/g, '<br>')}
                        </p>
                        <button class="delete" onclick="borrar('${snap.key}')">MARCAR ENTREGADO</button>
                    `;
                    document.getElementById('pedidos-lista').prepend(div);
                });

            } catch (e) {
                statusText.innerHTML = "❌ ERROR DE CONFIGURACIÓN: " + e.message;
                statusText.style.color = "#e74c3c";
            }
        }

        // Ejecutar después de que cargue la página
        window.onload = () => {
            setTimeout(conectar, 2000);
        };

        function borrar(id) {
            if(confirm("¿Pedido entregado?")) {
                firebase.database().ref('pedidos').child(id).remove().then(() => {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                });
            }
        }
    </script>
</body>
</html>
